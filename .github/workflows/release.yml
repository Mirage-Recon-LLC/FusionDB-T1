name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build installers
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: 0
      GOARCH: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Create dist directory
        run: mkdir -p dist

      # ── Linux ────────────────────────────────────────────────────────────
      - name: Build fusiondb (Linux — to embed)
        env:
          GOOS: linux
          REF_NAME: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.Version=$REF_NAME" \
            -o cmd/fusiondb-installer/fusiondb \
            ./cmd/fusiondb

      - name: Build fusiondb-bootstrap-linux (embedded installer)
        env:
          GOOS: linux
        run: |
          go build -tags embed_bin -trimpath -ldflags="-s -w" \
            -o dist/fusiondb-bootstrap-linux \
            ./cmd/fusiondb-installer

      - name: Clean up Linux embed binary
        run: rm -f cmd/fusiondb-installer/fusiondb

      # ── Windows ──────────────────────────────────────────────────────────
      - name: Build fusiondb (Windows — to embed)
        env:
          GOOS: windows
          REF_NAME: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.Version=$REF_NAME" \
            -o cmd/fusiondb-installer/fusiondb.exe \
            ./cmd/fusiondb

      - name: Build fusiondb-installer.exe (embedded installer)
        env:
          GOOS: windows
        run: |
          go build -tags embed_bin -trimpath -ldflags="-s -w" \
            -o dist/fusiondb-installer.exe \
            ./cmd/fusiondb-installer

      - name: Clean up Windows embed binary
        run: rm -f cmd/fusiondb-installer/fusiondb.exe

      # ── Checksums ────────────────────────────────────────────────────────
      - name: Create checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: dist/

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: dist/

      - name: Publish release
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.0.6
        with:
          files: |
            dist/*
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
