{{ define "main" }}
<section style="padding:4rem 0 2rem;border-bottom:1px solid var(--border-subtle);">
  <div class="container">
    <h1 class="section-title">{{ .Title }}</h1>
    {{ with .Params.subtitle }}<p class="section-subtitle">{{ . }}</p>{{ end }}
  </div>
</section>
<section class="section">
  <div class="container" style="max-width:860px;">
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
